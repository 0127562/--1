<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Новела КНК-1</title>

<style>
:root{
    --bg:#0f1117;
    --panel:#1a1d26;
    --panel2:#232734;
    --accent:#4da6ff;
    --text:#ffffff;
    --text2:#bfc8d8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

#chapterNavigation{

display:none;

justify-content:space-between;

gap:15px;

padding:20px;

background:var(--panel);
}

#chapterNavigation button{

flex:1;

border:none;

background:var(--panel2);

color:white;

padding:14px;

border-radius:10px;

cursor:pointer;

font-size:16px;

transition:.2s;
}

#chapterNavigation button:hover{

background:var(--accent);
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    height:100vh;
}

#sidebar{
    width:320px;
    background:var(--panel);
    border-right:1px solid #2f3444;
    overflow-y:auto;
}

.logo{
    padding:20px;
    font-size:28px;
    font-weight:bold;
    text-align:center;
    background:var(--panel2);
}

.section{
    padding:15px;
}

.section h3{
    margin-bottom:10px;
    color:var(--accent);
}

.book-btn,
.chapter-btn{
    width:100%;
    border:none;
    background:var(--panel2);
    color:white;
    margin-bottom:8px;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
    text-align:left;
}

.book-btn:hover,
.chapter-btn:hover{
    background:var(--accent);
}

.active{
    background:var(--accent)!important;
}

#content{
    flex:1;
    display:flex;
    flex-direction:column;
}

#header{
    background:var(--panel);
    padding:15px;
    border-bottom:1px solid #2f3444;
}

#title{
    font-size:28px;
}

#reader{
    flex:1;
    overflow-y:auto;
    padding:40px;
    line-height:1.8;
    font-size:20px;
    white-space:pre-wrap;
}

.placeholder{
    color:var(--text2);
    text-align:center;
    margin-top:100px;
}

@media(max-width:900px){

body{
    flex-direction:column;
}

#sidebar{
    width:100%;
    height:300px;
}

#reader{
    padding:20px;
}
}

#mobileMenuBtn{
    display:none;
}

@media(max-width:900px){

    #mobileMenuBtn{

        display:block;

        position:fixed;

        top:10px;

        left:10px;

        z-index:9999;

        border:none;

        border-radius:10px;

        padding:12px 16px;

        font-size:18px;

        cursor:pointer;
    }

    #sidebar{

        position:fixed;

        top:0;

        left:-100%;

        width:80%;

        height:100%;

        z-index:9998;

        transition:0.3s;
    }

    #sidebar.show{

        left:0;
    }

    #content{

        width:100%;
    }
}

</style>
</head>
<body>

<button id="mobileMenuBtn">☰ Меню</button>

<div id="sidebar">

<div class="logo">
КНК-1 📘
</div>

<div class="section">

<h3>Книги</h3>

<div id="books"></div>

</div>

<div class="section">

<h3>Глави</h3>

<div id="chapters"></div>

</div>

</div>

<div id="content">

<div id="header">

<div id="title">
Оберіть книгу та главу
</div>

</div>

<div id="reader">

<div class="placeholder">
Ласкаво просимо до архівів КНК-1.<br><br>
Оберіть книгу та главу зліва.
</div>

<div id="chapterNavigation">

    <button id="prevChapterBtn">
    ⬅ Попередня глава
    </button>
    
    <button id="nextChapterBtn">
    Наступна глава ➡
    </button>
    
    </div>

</div>

</div>

<script>

const BOOK_COUNT = 5;
const CHAPTERS_PER_BOOK = 15;

let currentBook = null;

const booksDiv = document.getElementById("books");
const chaptersDiv = document.getElementById("chapters");
const reader = document.getElementById("reader");
const title = document.getElementById("title");

const chapterNavigation =
document.getElementById("chapterNavigation");

const prevChapterBtn =
document.getElementById("prevChapterBtn");

const nextChapterBtn =
document.getElementById("nextChapterBtn");

let currentChapter = null;

for(let i=1;i<=BOOK_COUNT;i++){

    const btn=document.createElement("button");

    btn.className="book-btn";

    btn.textContent=`Книга ${i}`;

    btn.onclick=()=>selectBook(i);

    booksDiv.appendChild(btn);
}

function selectBook(book){

    currentBook=book;

    localStorage.setItem("lastBook",book);

    document.querySelectorAll(".book-btn")
        .forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".book-btn")[book-1]
        .classList.add("active");

    chaptersDiv.innerHTML="";

    for(let i=1;i<=CHAPTERS_PER_BOOK;i++){

        const btn=document.createElement("button");

        btn.className="chapter-btn";

        btn.textContent=`Глава ${i}`;

        btn.onclick=()=>loadChapter(book,i);

        chaptersDiv.appendChild(btn);
    }
}

async function loadChapter(book,chapter){

    try{

        const path =
        `book${book}/Глава ${chapter}.txt`;

        const response = await fetch(path);

        if(!response.ok)
            throw new Error();

        const text = await response.text();

        title.textContent=
        `Книга ${book} — Глава ${chapter}`;

        currentBook = book;
        currentChapter = chapter;

        chapterNavigation.style.display = "flex";

        reader.textContent = text;

        reader.scrollTop = 0;

        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;

        window.scrollTo({
            top: 0,
            left: 0,
            behavior: "auto"
        });

        setTimeout(() => {

        document.getElementById("header")
        .scrollIntoView({
            block: "start"
        });

        }, 50);

        localStorage.setItem(
            "lastChapter",
            chapter
        );

        localStorage.setItem(
            "lastBook",
            book
        );
        if(window.innerWidth <= 900){

        sidebar.classList.remove("show");
        }

    }

    catch{

        reader.innerHTML=
        `<div class="placeholder">
        Не вдалося знайти файл архіву:<br>
        book${book}/Глава ${chapter}.txt
        </div>`;
    }
}

prevChapterBtn.onclick = () => {

if(currentChapter > 1){

    loadChapter(
        currentBook,
        currentChapter - 1
    );
}
};

nextChapterBtn.onclick = () => {

if(currentChapter < CHAPTERS_PER_BOOK){

    loadChapter(
        currentBook,
        currentChapter + 1
    );
}
};
const lastBook=
Number(localStorage.getItem("lastBook"));

const lastChapter=
Number(localStorage.getItem("lastChapter"));

if(lastBook){

    selectBook(lastBook);

    if(lastChapter){

        loadChapter(
            lastBook,
            lastChapter
        );
    }
}

</script>

<script>

    const mobileBtn =
    document.getElementById("mobileMenuBtn");

    const sidebar =
    document.getElementById("sidebar");

    mobileBtn.addEventListener("click", () => {

        sidebar.classList.toggle("show");
    });
    
</script>

</body>
</html>
